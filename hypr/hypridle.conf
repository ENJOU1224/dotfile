general {
    # 锁定指令：如果 hyprlock 没运行则启动它，避免重复实例
    lock_cmd = pidof hyprlock || hyprlock       
    # 睡眠前锁定：在系统挂起前先锁定会话
    before_sleep_cmd = loginctl lock-session    
    # 唤醒后操作：开启屏幕显示，防止需要按两次键才能点亮屏幕
    after_sleep_cmd = hyprctl dispatch dpms on  
}

# 1. 键盘背光控制 (10秒)
# 针对 ASUS 笔记本：长时间无输入自动熄灭键盘灯以省电
listener { 
    timeout = 10                                          
    on-timeout = brightnessctl -sd asus::kbd_backlight set 0 
    on-resume = brightnessctl -rd asus::kbd_backlight        
}

# 2. 屏幕亮度微调 (1分钟)
# 在无操作一分钟后将背光调至极低，起到提醒作用且保护 OLED 避免 0 亮度问题
listener {
    timeout = 60                                
    on-timeout = brightnessctl -s set 3         
    on-resume = brightnessctl -r                 
}

# 3. 屏幕锁定 (2分钟)
# 触发系统会话锁定，进入锁屏界面
listener {
    timeout = 120                                 
    on-timeout = loginctl lock-session            
}

# 4. 关闭屏幕输出 (2.5分钟)
# 物理切断显示器信号以实现深度节能
listener {
    timeout = 150                                 
    on-timeout = hyprctl dispatch dpms off        
    on-resume = hyprctl dispatch dpms on          
}

# 5. 条件式系统挂起 (10分钟)
# 核心逻辑：只有在【未插电】(AC0/online == 0) 的情况下才会触发系统挂起
# 这确保了插电使用时的持续性，同时兼顾了移动办公时的续航
listener {
    timeout = 600                                
    on-timeout = [ $(cat /sys/class/power_supply/AC0/online) -eq 0 ] && systemctl suspend
}
